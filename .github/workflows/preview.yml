name: Deploy Staging Preview

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - run: echo "staging.studio-kaku.com" > dist/CNAME
      - run: touch dist/.nojekyll

      - name: Deploy to staging repo
        env:
          STAGING_PAT: ${{ secrets.STAGING_PAT }}
        run: |
          cd dist
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "staging deploy $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push --force \
            https://x-access-token:${STAGING_PAT}@github.com/studio-kaku/staging.studio-kaku.com.git \
            HEAD:main

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 540">
  <defs>
    <!-- Horizontal stripe pattern for trousers -->
    <pattern id="trousers" patternUnits="objectBoundingBox" patternContentUnits="objectBoundingBox" width="1" height="0.12">
      <rect width="1" height="1" fill="#B5A694"/>
      <rect width="1" height="0.4" fill="#FAFAF8" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="480" height="540" fill="#FAFAF8"/>

  <!-- ===== LOGO TEXT ===== -->
  <text x="240" y="100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="66"
    font-weight="bold"
    fill="#1C1C1C"
    text-anchor="middle"
    letter-spacing="3">STUDIO KAKU</text>

  <!-- Subtitle flanking text (like the reference) -->
  <text x="32" y="128"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    fill="#B5A694"
    letter-spacing="4"
    font-weight="600">ART SERVICES</text>
  <text x="448" y="128"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    fill="#B5A694"
    letter-spacing="4"
    font-weight="600"
    text-anchor="end">LONDON</text>

  <!-- ===== WALKING FIGURE ===== -->
  <!-- Figure is centered around x=240 -->

  <!-- PAINTBRUSHES — 4 brushes held aloft, bristles pointing up -->
  <!-- Brush 1 (leftmost, most tilted) -->
  <g transform="translate(231,286) rotate(-30)">
    <rect x="-3.5" y="-95" width="7" height="105" rx="2.5" fill="#B5A694"/>
    <rect x="-4.5" y="-108" width="9" height="16" rx="2" fill="#8A8A8A"/>
    <path d="M-4.5,-108 Q0,-130 4.5,-108" fill="#1C1C1C"/>
  </g>

  <!-- Brush 2 -->
  <g transform="translate(238,281) rotate(-14)">
    <rect x="-3.5" y="-98" width="7" height="108" rx="2.5" fill="#B5A694"/>
    <rect x="-4.5" y="-111" width="9" height="16" rx="2" fill="#8A8A8A"/>
    <path d="M-4.5,-111 Q0,-133 4.5,-111" fill="#1C1C1C"/>
  </g>

  <!-- Brush 3 -->
  <g transform="translate(244,279) rotate(1)">
    <rect x="-3.5" y="-98" width="7" height="108" rx="2.5" fill="#B5A694"/>
    <rect x="-4.5" y="-111" width="9" height="16" rx="2" fill="#8A8A8A"/>
    <path d="M-4.5,-111 Q0,-133 4.5,-111" fill="#1C1C1C"/>
  </g>

  <!-- Brush 4 (rightmost) -->
  <g transform="translate(250,282) rotate(16)">
    <rect x="-3.5" y="-95" width="7" height="105" rx="2.5" fill="#B5A694"/>
    <rect x="-4.5" y="-108" width="9" height="16" rx="2" fill="#8A8A8A"/>
    <path d="M-4.5,-108 Q0,-130 4.5,-108" fill="#1C1C1C"/>
  </g>

  <!-- LEFT ARM — curves up from torso to grip the brushes -->
  <path d="M 222 352 Q 210 328 220 304 Q 226 289 231 285"
    stroke="#1C1C1C" stroke-width="17" fill="none" stroke-linecap="round"/>

  <!-- RIGHT ARM -->
  <path d="M 258 352 Q 270 328 260 304 Q 254 289 250 283"
    stroke="#1C1C1C" stroke-width="17" fill="none" stroke-linecap="round"/>

  <!-- TORSO (connects arms to legs) -->
  <ellipse cx="240" cy="358" rx="28" ry="16" fill="#1C1C1C"/>

  <!-- LEFT LEG (stepping forward, lean left -10°) -->
  <g transform="translate(227,367) rotate(-10)">
    <rect x="-13" y="0" width="26" height="86" rx="11" fill="url(#trousers)"/>
  </g>
  <!-- Left shoe -->
  <ellipse cx="213" cy="453" rx="26" ry="12" fill="#1C1C1C" transform="rotate(-10 213 453)"/>

  <!-- RIGHT LEG (kicking back, lean right +28°) -->
  <g transform="translate(254,367) rotate(28)">
    <rect x="-13" y="0" width="26" height="80" rx="11" fill="url(#trousers)"/>
  </g>
  <!-- Right shoe -->
  <ellipse cx="291" cy="438" rx="24" ry="11" fill="#1C1C1C" transform="rotate(28 291 438)"/>
</svg>

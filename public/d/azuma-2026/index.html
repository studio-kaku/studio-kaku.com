e,attributes:true,attributeFilter:['src']});}})();</script><script>(function(){var ORDER=['A969E1CB-EBB3-4981-9E6B-E79C5FC7591B','29A3D2B2-BB91-46D4-A8EF-35F81C199B91','80F186E8-CA59-466B-87E4-48DB353665A8','C26F2C90-8A0B-454E-84D7-5CCC796DAFD1','516831FF-59E4-4D16-AE71-302781877C60','ED590F97-9A2D-47DF-9B06-D61FBD449249','0097BB6C-E61A-4012-A5D3-654C8D7ED5AF','1D7DB497-0A0A-4A04-A98D-F8C70F663CC3','6257CCEC-FE75-4504-BBD4-CD2E6ADEB504','22C0B099-BAF4-49E5-B2E1-2AFF07A84A8C','1291009B-F995-452C-AACB-8CDA4F5E4CBE','F417AA27-DEC5-4C81-99BA-C8CD3E3AA86E','26775678-D5CE-40C5-B67D-980FC1D27A43'];var T={'A969E1CB-EBB3-4981-9E6B-E79C5FC7591B':{t:'「自然と共に」',b:'自然を愛し、尊重することは、自分自身を愛し、尊重することである。\n\nこの気候危機は、前例のない喪失の物語である必要はありません。むしろ、救済、再生、そして変化の物語です。アレハンドロ・ロペスの絵画は、自然界との共存における精神的な本質、根底にあるエネルギーを捉えています。自然を愛し、尊重することを学ぶことで、私たちは自分自身を愛し、尊重します。それが新しい世界のために変化をもたらすために必要なことです。'},'29A3D2B2-BB91-46D4-A8EF-35F81C199B91':{t:'「自然と共に」',b:'自然を愛し、尊重することは、自分自身を愛し、尊重することである。\n\nこの気候危機は、前例のない喪失の物語である必要はありません。むしろ、救済、再生、そして変化の物語です。アレハンドロ・ロペスの絵画は、自然界との共存における精神的な本質、根底にあるエネルギーを捉えています。'},'80F186E8-CA59-466B-87E4-48DB353665A8':{t:'アレハンドロ・M・ロペス',b:'私の作品は、自然の精神的な次元と、その中での私たちの共存を探求しています。各絵画は、ハイキングや登山が瞑想の形となる辺境の地で制作されています。その静寂の中で、見えるものではなく、感じるもの——エネルギー、動き、自然界の存在感——に応えながら、ライブで描きます。\n\nアレハンドロ・M・ロペスはロサンゼルス生まれ。アート・センター・カレッジ・オブ・デザインで学んだ後、4大陸にわたって25年間生活し、絵画を描き続けました。現在はカリフォルニアと日本を行き来しながら活動しています。生ベルギーリネンと手製の画面を使い、墨、鉱物顔料、日本の伝統的な素材と現代の画材を組み合わせ、東西の技法を融合させています。'},'C26F2C90-8A0B-454E-84D7-5CCC796DAFD1':{t:'アレハンドロ・M・ロペス ／ 過去の展覧会',b:'私の作品は、自然の精神的な次元と、その中での私たちの共存を探求しています。\n\n過去の展覧会：\n東京 2026年2月6日〜27日 ギャラリー蔵\nロサンゼルス 2026年1月10日 マクスウェル・アレクサンダー・ギャラリー\n京都 2024年11月1日〜24日 ニュートラル・ギャラリー\n東京 2023年11月7日〜26日 ワトワ・ギャラリー\nロサンゼルス 2024年8月4日〜28日 ザ・ポスト'},'516831FF-59E4-4D16-AE71-302781877C60':{t:'過去の展覧会',b:'東京 2026年2月6日〜27日 ギャラリー蔵\nロサンゼルス 2026年1月10日 マクスウェル・アレクサンダー・ギャラリー\n京都 2024年11月1日〜24日 ニュートラル・ギャラリー\n東京 2023年11月7日〜26日 ワトワ・ギャラリー\nロサンゼルス 2024年8月4日〜28日 ザ・ポスト\n\n日本プレス掲載：ジャパン・タイムズ／ミックスマグ・ジャパン／GQジャパン／マリ・クレール'},'ED590F97-9A2D-47DF-9B06-D61FBD449249':{t:'日本プレス掲載 ／「自然と共に」講演イベント',b:'掲載媒体：ジャパン・タイムズ／ミックスマグ・ジャパン／GQジャパン／マリ・クレール\n\n環境芸術家・活動家として、私は芸術活動を通じて、自然界との共生をどのように物理的な交流と自然の中での存在感によって深めることができるかについて、世界中の人々と議論と共有体験に取り組んでいます。'},'0097BB6C-E61A-4012-A5D3-654C8D7ED5AF':{t:'「自然と共に」講演イベント',b:'環境芸術家・活動家として、私は芸術活動を通じて、自然界との共生をどのように物理的な交流と自然の中での存在感によって深めることができるかについて、世界中の人々と議論と共有体験に取り組んでいます。'},'1D7DB497-0A0A-4A04-A98D-F8C70F663CC3':{t:'小岩井農場 ― ブランド体験と文化的ポジショニング',b:'アレハンドロ・M・ロペスは、完全に自然界への没入を基盤とした外光派画家です。次回の個展「自然と共に」は、表参道のGYREギャラリーにて12月4日にオープンし、1月8日まで開催されます。\n\n小岩井農場での短期アーティスト・イン・レジデンスを提案します。農場の景観の中で数日間滞在し、季節の中で大地に直接向き合いながら野外制作を行います。小岩井で生まれた作品群は展覧会の物語の一部となり得ます——絵画、映像、そして滞在の記録を通じて伝えます。'},'6257CCEC-FE75-4504-BBD4-CD2E6ADEB504':{t:'小岩井農場提案 ／ GYREについて',b:'（提案概要）アレハンドロの個展「自然と共に」は12月4日、表参道GYREギャラリーにてオープン。小岩井農場での野外制作レジデンスを通じ、作品の原点として農場をクレジットします。\n\nGYREは表参道を代表するデスティネーション型の商業・コミュニティ空間。年間来館者数19万〜20万人、12月は年間最多。可処分所得のある25〜35歳の日本人および訪日外国人が主な来館者層です。'},'22C0B099-BAF4-49E5-B2E1-2AFF07A84A8C':{t:'GYREについて ／ アライメントとご提供内容',b:'アライメント：小岩井の哲学（大地に寄り添い、季節によって形作られ、場所に根ざした暮らし）とアレハンドロの制作（現地でのみ制作、光・天気・大地と直接対話）は深く一致しています。\n\nご提供内容：\n・展覧会の日本作品の起点として小岩井をクレジット（壁面テキスト・プレス・展覧会ナレーティブ）\n・公開前夜のプライベート・イベントのためのギャラリー独占利用\n・農場制作のドキュメンタリー写真・映像（ブランドコンテンツとして利用可能）\n・SNS掲載、プレスリリースでの明記\n・日本の景観・現代アート・東京の文化空間の交差点に小岩井を位置づける真の独自ストーリー'},'1291009B-F995-452C-AACB-8CDA4F5E4CBE':{t:'なぜAzuma Farm 小岩井か ／ ご提供内容（詳細）',b:'Azuma Farm 小岩井は単なる背景ではありません。農場の創業理念（スローライフ、大地との繋がり、季節への敬意）は、アレハンドロが体現していることそのものです。このレジデンシーは宣伝活動ではなく、芸術家と場所が真に一致したときにのみ生まれる本物の創造的な出会いです。\n\nご提供内容：\n・展覧会の日本作品の起点として小岩井をクレジット\n・公開前夜のプライベート・イベントのためのギャラリー独占利用\n・農場制作のドキュメンタリー写真・映像\n・SNS掲載、プレスリリースでの明記'},'F417AA27-DEC5-4C81-99BA-C8CD3E3AA86E':{t:'お願いしたいこと ／ スポンサーシップ・ティア',b:'お願いしたいこと：\n・アーティストとチームのAzuma Farm 小岩井での3〜5泊の滞在\n・野外制作のための農場景観へのアクセス\n\nティア1：500万〜800万円（35,000〜50,000ドル）\n・スポンサーの一社としてのブランド・ロゴ掲載／既存コンテンツのみ／QRコードリンク付き作品2点展示\n\nティア2：1,000万〜1,500万円（63,000〜95,000ドル）\n・リード・スポンサーとしての全媒体への目立つロゴ掲載\n・GYREでのプライベート・プレビュー・ナイト（独占開催）\n・QRコードリンク付き原画4点展示\n・ギャラリー全体にレジデンシーの物語を伝えるディスプレイ・カード設置\n・独占ドキュメンタリーコンテンツ（写真・映像）'},'26775678-D5CE-40C5-B67D-
